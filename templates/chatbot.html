<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>/* Chat Icon */
.chat-icon{
position:fixed;
bottom:20px;
right:20px;
background:#1e3c72;
color:white;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

/* Chatbox */
.chat-container{
position:fixed;
bottom:90px;
right:20px;
width:300px;
background:white;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
display:none;
flex-direction:column;
overflow:hidden;
}

/* Header */
.chat-header{
background:#1e3c72;
color:white;
padding:10px;
display:flex;
justify-content:space-between;
}

/* Body */
.chat-body{
height:220px;
overflow-y:auto;
padding:10px;
background:#f2f2f2;
}

/* Messages */
.bot-msg{
background:#dbe6ff;
padding:6px;
margin:5px;
border-radius:5px;
}

.user-msg{
background:#d6ffd9;
padding:6px;
margin:5px;
border-radius:5px;
text-align:right;
}

/* Input */
.chat-input{
display:flex;
}

.chat-input input{
flex:1;
padding:8px;
border:none;
border-top:1px solid #ddd;
}

.chat-input button{
background:#1e3c72;
color:white;
border:none;
padding:8px 12px;
}</style>
</head>
<body>
    
    
    <!-- Chatbot Icon -->
<div class="chat-icon" onclick="openChat()">
💬
</div>

<!-- Chatbot -->
<div class="chat-container" id="chatbot">
  
  <div class="chat-header">
    INMBA Assistant
    <span onclick="closeChat()">✖</span>
  </div>

  <div class="chat-body" id="chatBody">
    <div class="bot-msg">Hello 👋 Welcome to INMBA Foundation</div>
  </div>

  <div class="chat-input">
    <input type="text" id="userInput" placeholder="Ask something...">
    <button onclick="sendMsg()">Send</button>
  </div>

</div>
<script>

function openChat(){
document.getElementById("chatbot").style.display="flex";
}

function closeChat(){
document.getElementById("chatbot").style.display="none";
}

function sendMsg(){

let input=document.getElementById("userInput");
let message=input.value;

let chatBody=document.getElementById("chatBody");

chatBody.innerHTML += `<div class="user-msg">${message}</div>`;

let reply="Sorry I didn't understand.";

if(message.toLowerCase().includes("membership")){
reply="You can join INMBA using our membership form.";
}

if(message.toLowerCase().includes("program")){
reply="INMBA provides leadership and entrepreneurship programs.";
}

if(message.toLowerCase().includes("event")){
reply="Upcoming event: Leadership Summit.";
}

chatBody.innerHTML += `<div class="bot-msg">${reply}</div>`;

input.value="";

chatBody.scrollTop=chatBody.scrollHeight;

}

</script>
</body>
</html>
