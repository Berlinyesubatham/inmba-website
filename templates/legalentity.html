<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>INMBA Legal Entity</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
* { box-sizing: border-box; margin:0; padding:0; }
body { font-family:'Segoe UI',sans-serif; background:#e8f5e9; }
.container { max-width:400px; margin:50px auto; background:white; padding:25px; border-radius:15px; box-shadow:0 5px 15px rgba(0,0,0,0.2); }
h2 { text-align:center; color:#0f4d0f; margin-bottom:15px; }
label { display:block; margin-bottom:5px; font-weight:600; }
input, select { width:100%; padding:10px; margin-bottom:15px; border:1px solid #ccc; border-radius:8px; }
button { width:100%; padding:12px; background:linear-gradient(135deg,#0f4d0f,#28a745); color:white; border:none; border-radius:8px; font-size:16px; cursor:pointer; }
button:hover { transform:scale(1.02); }
.address-container { max-width: 450px; margin: 30px auto; background: #f0fff4; padding: 25px 20px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); font-family: 'Segoe UI', sans-serif; }
.address-container h3 { text-align: center; color: #0f4d0f; margin-bottom: 20px; }
.address-row { position: relative; margin-bottom: 18px; }
.address-row input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; outline: none; font-size: 14px; transition: 0.3s; }
.address-row label { position: absolute; left: 12px; top: 12px; color: gray; font-size: 14px; pointer-events: none; transition: 0.3s; }
.address-row input:focus + label,
.address-row input:not(:placeholder-shown) + label {
  top: -10px;
  left: 8px;
  font-size: 12px;
  color: #0f4d0f;
  background: #f0fff4;
  padding: 0 4px;
}
.error { color:red; font-size:14px; margin-top:-10px; margin-bottom:10px; }
.preview{
  width:120px;
  height:120px;
  margin-top:10px;
  display:none;
  position:relative;
  overflow:hidden;
  border-radius:10px;
  border:1px solid #ccc;
}

.preview img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.preview span{
  position:absolute;
  top:-8px;
  right:-8px;
  background:red;
  color:white;
  width:22px;
  height:22px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-size:14px;
}
.upload-row{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:15px;
}

.custom-upload input{
  display:none;
}

.custom-upload{
  background:#0f4d0f;
  color:white;
  padding:7px 12px;
  border-radius:6px;
  font-size:13px;
  cursor:pointer;
}

.custom-upload:hover{
  background:#28a745;
}

.preview-box{
  width:50px;
  height:50px;
  display:none;
  position:relative;
}

.preview-box img{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:6px;
}

.preview-box span{
  position:absolute;
  top:-6px;
  right:-6px;
  background:red;
  color:white;
  width:16px;
  height:16px;
  font-size:10px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}
.modern-upload{
  display:flex;
  align-items:center;
  justify-content:space-between;
  border:1px solid #e0e0e0;
  border-radius:10px;
  padding:10px 12px;
  background:#fafafa;
  margin-bottom:12px;
}

.upload-left{
  cursor:pointer;
  display:flex;
  flex-direction:column;
  font-size:14px;
  color:#0f4d0f;
}

.upload-left small{
  font-size:11px;
  color:gray;
  margin-top:2px;
}

/* hide input */
.modern-upload input{
  display:none;
}

/* preview */
.preview-box{
  width:45px;
  height:45px;
  display:none;
  position:relative;
}

.preview-box img{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:6px;
}

.preview-box span{
  position:absolute;
  top:-5px;
  right:-5px;
  background:red;
  color:white;
  width:16px;
  height:16px;
  font-size:10px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}
 .top-back-btn {
    position: absolute;
    top: 18px;
    left: 18px;
    background: linear-gradient(135deg, #0f9d58, #34c759);
    font-size: 16px;
    color: #0f4d0f;

    text-decoration: none;

    display: flex;
    align-items: center;
    justify-content: center;

    width: 34px;
    height: 34px;

    border-radius: 50%;

    transition: 0.2s ease;
}

.top-back-btn:hover {
    color: #34c759;
    background: rgba(52, 199, 89, 0.1);
}
</style>
</head>
<body>

<div class="container">
      <a class="top-back-btn" href="{{ url_for('bank_form',token=token) }}">
    <i class="fas fa-arrow-left"></i>
</a>
<h2>Enter Legal Entity Details</h2>

<form id="legalForm" action="/legal_entity_submit/{{ token }}" method="POST" enctype="multipart/form-data">
  <label>Aadhar Number</label>
  <input type="text" name="entity_aadhar_number" placeholder="Enter Aadhar number" required pattern="\d{12}" title="Enter 12-digit Aadhar number">
<div class="upload-row modern-upload">

  <!-- LEFT -->
  <div class="upload-left" onclick="document.getElementById('aadFront').click()">
    📄 Aadhaar Front
    <small id="aadFrontName">No file selected</small>
  </div>

  <!-- INPUT -->
  <input type="file" name="entity_aadhar_front" id="aadFront"
    accept="image/png, image/jpeg"
    onchange="handleImage(event,'aadFront','aadFrontPreview','aadFrontBox','aadFrontName')" required>

  <!-- PREVIEW -->
  <div class="preview-box" id="aadFrontBox">
    <img id="aadFrontPreview">
    <span onclick="removeImage('aadFront','aadFrontBox','aadFrontPreview','aadFrontName')">✖</span>
  </div>

</div>
<div class="upload-row modern-upload">

  <div class="upload-left" onclick="document.getElementById('aadBack').click()">
    📄 Aadhaar Back
    <small id="aadBackName">No file selected</small>
  </div>

  <input type="file" name="entity_aadhar_back" id="aadBack"
    accept="image/png, image/jpeg"
    onchange="handleImage(event,'aadBack','aadBackPreview','aadBackBox','aadBackName')" required>

  <div class="preview-box" id="aadBackBox">
    <img id="aadBackPreview">
    <span onclick="removeImage('aadBack','aadBackBox','aadBackPreview','aadBackName')">✖</span>
  </div>

</div>
<div class="upload-row modern-upload">

  <div class="upload-left" onclick="document.getElementById('aadSelfie').click()">
    🤳 Aadhaar Selfie
    <small id="aadSelfieName">No file selected</small>
  </div>

  <input type="file" name="entity_aadhar_selfie" id="aadSelfie"
    accept="image/png, image/jpeg"
    onchange="handleImage(event,'aadSelfie','aadSelfiePreview','aadSelfieBox','aadSelfieName')" required>

  <div class="preview-box" id="aadSelfieBox">
    <img id="aadSelfiePreview">
    <span onclick="removeImage('aadSelfie','aadSelfieBox','aadSelfiePreview','aadSelfieName')">✖</span>
  </div>

</div>
  <div class="address-container">
    <h3>🏠 Enter Your Address</h3>
    
    <div class="address-row">
      <input type="text" name="entity_house_no"  required>
      <label>House No / Building</label>
    </div>

    <div class="address-row">
      <input type="text" name="entity_street" required>
      <label>Street / Road</label>
    </div>

    <div class="address-row">
      <input type="text" name="entity_area"  required>
      <label>Area / Locality</label>
    </div>

    <div class="address-row">
      <input type="text" name="entity_city"  required>
      <label>City</label>
    </div>

    <div class="address-row">
      <input type="text" name="entity_district"  required>
      <label>District</label>
    </div>

    <div class="address-row">
      <input type="text" name="entity_state"  required>
      <label>State</label>
    </div>

    <div class="address-row">
      <input type="text" name="entity_pincode"  required pattern="\d{6}" title="Enter 6-digit Pincode">
      <label>Pincode</label>
    </div>
  </div>

  <div class="error" id="errorMsg"></div>

  <button type="submit">✅ Submit Legal Entity</button>
</form>
</div>
<script>
const legalForm = document.getElementById('legalForm');
const errorMsg = document.getElementById('errorMsg');

window.onload = function () {

  if (!legalForm) return;

  legalForm.addEventListener('submit', function(e) {
    errorMsg.textContent = '';

    const aadhar = legalForm.entity_aadhar_number.value;
    if (!/^\d{12}$/.test(aadhar)) {
        e.preventDefault();
        errorMsg.textContent = "❌ Aadhar number must be 12 digits";
        return;
    }

    const files = ['entity_aadhar_front','entity_aadhar_back','entity_aadhar_selfie'];
    for (let f of files) {
        const fileInput = legalForm[f];
        if (!fileInput.files.length) {
            e.preventDefault();
            errorMsg.textContent = `❌ Please upload ${f.replace(/_/g,' ')}`;
            return;
        }

        const allowedTypes = ['image/jpeg','image/png'];
        if (!allowedTypes.includes(fileInput.files[0].type)) {
            e.preventDefault();
            errorMsg.textContent = `❌ ${f.replace(/_/g,' ')} must be JPG or PNG`;
            return;
        }
    }

    const pin = legalForm.entity_pincode.value;
    if (!/^\d{6}$/.test(pin)) {
        e.preventDefault();
        errorMsg.textContent = "❌ Pincode must be 6 digits";
        return;
    }

  });

};
function handleImage(event,inputId,imgId,boxId){
    const file = event.target.files[0];
    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(e){
        const img = new Image();
        img.src = e.target.result;

        img.onload = function(){

            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");

            let w = img.width;
            let h = img.height;

            // compress size
            const maxWidth = 600;
            if(w > maxWidth){
                h = h * (maxWidth / w);
                w = maxWidth;
            }

            canvas.width = w;
            canvas.height = h;

            ctx.drawImage(img,0,0,w,h);

            const compressed = canvas.toDataURL("image/jpeg",0.6);

            document.getElementById(imgId).src = compressed;
            document.getElementById(boxId).style.display = "block";

            fetch(compressed)
            .then(res => res.blob())
            .then(blob => {
                const newFile = new File([blob], file.name,{type:"image/jpeg"});
                const dt = new DataTransfer();
                dt.items.add(newFile);
                document.getElementById(inputId).files = dt.files;
            });
        }
    }

    reader.readAsDataURL(file);
}

function removeImage(inputId, boxId, imgId){
    document.getElementById(inputId).value = "";
    document.getElementById(imgId).src = "";
    document.getElementById(boxId).style.display = "none";
}
</script>

</body>
</html>
