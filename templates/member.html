<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background: #f4f6f9;
}

/* CARD */
.dashboard-card {
  background: linear-gradient(45deg, #0f4d0f, #22c55e);
  color: white;
  padding: 20px;
  border-radius: 15px;
  text-align: center;
  box-shadow: 0 5px 20px rgba(0,0,0,0.2);
}

/* TABLE */
.table-container {
  background: white;
  padding: 20px;
  border-radius: 15px;
  margin-top: 20px;
  box-shadow: 0 0 15px rgba(0,0,0,0.1);
}

table th {
  background: #0f4d0f;
  color: white;
}

/* BUTTON */
.btn-danger {
  border-radius: 20px;
}
</style>

</head>
<body>

<div class="container mt-5">

  <h2 class="text-center mb-4">👨‍💼 Admin Dashboard</h2>

  <!-- STATS -->
  <div class="row text-center">

    <div class="col-md-4 mb-3">
      <div class="dashboard-card">
        <h3>{{ members|length }}</h3>
        <p>Total Members</p>
      </div>
    </div>

  </div>

  <!-- TABLE -->
  <div class="table-container">

    <h4 class="mb-3">Members List</h4>

    <div class="table-responsive">
      <table class="table table-bordered table-hover">

        <thead>
          <tr>
            <th>ID</th>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Membership</th>
            <th>Action</th>
          </tr>
        </thead>

        <tbody>
          {% for m in members %}
          <tr>
            <td>{{ m[0] }}</td>
            <td>{{ m[1] }}</td>
            <td>{{ m[2] }}</td>
            <td>{{ m[4] }}</td>
            <td>{{ m[5] }}</td>
            <td>{{ m[11] }}</td>

            <td>
              <a href="/delete/{{ m[0] }}" class="btn btn-danger btn-sm">Delete</a>
            </td>
          </tr>
          {% endfor %}
        </tbody>

      </table>
    </div>

  </div>

</div>

</body>
</html>
