<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>INMBA Secure Payment</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #e8f5e9, #ffffff);
        }

        /* HEADER */
        .header {
            background: #0f4d0f;
            color: white;
            text-align: center;
            padding: 25px;
            font-size: 22px;
            letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        /* CONTAINER */
        .container {
            max-width: 420px;
            margin: 40px auto;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            animation: fadeIn 0.6s ease-in-out;
        }

        /* ANIMATION */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* TITLE */
        h2 {
            text-align: center;
            color: #0f4d0f;
            margin-bottom: 8px;
        }

        .secure {
            text-align: center;
            font-size: 13px;
            color: gray;
            margin-bottom: 18px;
        }

        /* FORM */
        .form-group {
            margin-bottom: 18px;
        }

        label {
            font-weight: 600;
            margin-bottom: 5px;
            display: block;
        }

        /* INPUT */
        input,
        select {
            width: 100%;
            padding: 11px;
            border-radius: 8px;
            border: 1px solid #ccc;
            transition: 0.3s;
            font-size: 14px;
        }

        input:focus,
        select:focus {
            border-color: #0f4d0f;
            box-shadow: 0 0 8px #0f4d0f40;
            outline: none;
        }

        /* RADIO */
        .radio-group {
            display: flex;
            gap: 10px;
        }

        .radio-group label {
            background: #f1f7f1;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid #dcdcdc;
        }

        .radio-group label:hover {
            background: #e0f2e0;
            transform: scale(1.05);
        }

        /* DETAILS BOX */
        .details-box {
            display: none;
            margin-top: 10px;
            background: #f1f7f1;
            padding: 12px;
            border-left: 5px solid #0f4d0f;
            border-radius: 8px;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.1);
            animation: fadeIn 0.4s;
        }

        .qr img {
            width: 130px;
            display: block;
            margin: auto;
        }

        /* BUTTON */
        button {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #0f4d0f, #28a745);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.25);
        }

        button:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        /* FOOTER NOTE */
        .note {
            text-align: center;
            font-size: 12px;
            margin-top: 10px;
            color: gray;
        }

        /* MOBILE */
        @media (max-width: 500px) {
            .container {
                margin: 15px;
                padding: 18px;
            }

            .radio-group {
                flex-direction: column;
            }
        }

        .upload-card {
            background: #f3f4f6;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            border: 1px solid #e5e7eb;

            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }

        .upload-card:hover {
            background: #e5e7eb;
        }

        .upload-left-content {
            font-weight: 600;
            color: #065f46;
        }

        .upload-left-content small {
            display: block;
            font-size: 13px;
            color: #6b7280;
            margin-top: 4px;
        }

        /* RIGHT IMAGE */
        .upload-preview {
            width: 60px;
            height: 60px;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            display: none;
            border: 1px solid #ddd;
        }

        .upload-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* REMOVE BUTTON */
        .upload-preview span {
            position: absolute;
            top: -6px;
            right: -6px;
            background: red;
            color: white;
            font-size: 12px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

    .top-back-btn {
    position: absolute;
    top: 18px;
    left: 18px;
    background: linear-gradient(135deg, #0f9d58, #34c759);
    font-size: 16px;
    color: #0f4d0f;

    text-decoration: none;

    display: flex;
    align-items: center;
    justify-content: center;

    width: 34px;
    height: 34px;

    border-radius: 50%;

    transition: 0.2s ease;
}

.top-back-btn:hover {
    color: #34c759;
    background: rgba(52, 199, 89, 0.1);
}
    </style>
</head>

<body>

    <div class="header">
        💳 INMBA Secure Payment Gateway
    </div>
  <a class="top-back-btn" href="{{ url_for('policy') }}">
            <i class="fas fa-arrow-left"></i>
        </a>
    <div class="container">
      
        <h2>💰 Complete Payment</h2>
        <p class="secure">🔒 100% Secure | Encrypted Payment</p>

        <form action="{{ url_for('payment_submit') }}" method="POST" enctype="multipart/form-data">

            <div class="form-group">
                <label>💼 Select Payment Method</label>

                <div class="radio-group">
                    <label><input type="radio" name="payment_method" value="Account" onclick="showDetails()" required>
                        🏦 Account</label>
                    <label><input type="radio" name="payment_method" value="UPI" onclick="showDetails()"> 📱 UPI</label>
                    <label><input type="radio" name="payment_method" value="QR" onclick="showDetails()"> 📷 QR</label>
                </div>
            </div>


            <div id="accountBox" class="details-box">
                <b>🏦 Account No:</b> 70340200001467<br>
                <b>🔢 IFSC:</b> BARB0VJPACO
            </div>

            <div id="upiBox" class="details-box">
                <b>📱 UPI ID:</b> robertsonraja@barodampay
            </div>

            <div id="qrBox" class="details-box qr">

                <img src="{{ url_for('static', filename='images/qr.jpeg') }}">
                <p style="text-align:center;">📷 Scan & Pay</p>
            </div>


            <div class="form-group">
                <label>📅 Subscription Plan</label>
                <select name="subscription_year" required>
                    <option value="">Select Plan</option>
                    <option value="1">1 Year</option>
                    <option value="2">2 Years</option>
                    <option value="3">3 Years</option>
                </select>
            </div>
            <div class="form-group">
                <label>💰 Amount</label>
                <input type="number" name="amount" placeholder="Enter amount" required min="1" step="0.01">
            </div>

            <div class="form-group">
                <label>🔑 Transaction ID</label>
                <input type="text" name="transaction_id" placeholder="Enter transaction ID (optional)">
            </div>

            <div class="form-group">
                <label>📎 Upload Payment Proof</label>

                <div class="upload-card" onclick="document.getElementById('proofInput').click()">

                    <!-- LEFT TEXT -->
                    <div class="upload-left-content">
                        📷 Upload Screenshot
                        <small id="fileName">PNG / JPG only (Max 1MB)</small>
                    </div>

                    <!-- RIGHT IMAGE -->
                    <div id="previewBox" class="upload-preview">
                        <img id="previewImg">
                        <span onclick="removeImage(event)">✖</span>
                    </div>

                </div>

                <!-- INPUT -->
                <input type="file" name="payment_proof" id="proofInput" accept="image/png, image/jpeg"
                    onchange="previewImage(event)" hidden>
            </div>

            <button type="submit">✅ Confirm Payment</button>

            <p class="note">⚡ Payment will be verified by admin within 24 hours</p>

        </form>

    </div>

    <script>
        function showDetails() {
            let method = document.querySelector('input[name="payment_method"]:checked').value;

            document.getElementById("accountBox").style.display = "none";
            document.getElementById("upiBox").style.display = "none";
            document.getElementById("qrBox").style.display = "none";

            if (method === "Account") {
                document.getElementById("accountBox").style.display = "block";
            }
            else if (method === "UPI") {
                document.getElementById("upiBox").style.display = "block";
            }
            else {
                document.getElementById("qrBox").style.display = "block";
            }
        }
        function previewImage(event) {
            const file = event.target.files[0];
            if (!file) return;

            const allowed = ['image/jpeg', 'image/png'];

            if (!allowed.includes(file.type)) {
                alert("Only JPG or PNG allowed");
                event.target.value = "";
                return;
            }

            if (file.size > 1 * 1024 * 1024) {
                alert("Max 1MB only");
                event.target.value = "";
                return;
            }

            document.getElementById("fileName").innerText = file.name;

            const reader = new FileReader();
            reader.onload = function (e) {
                document.getElementById("previewImg").src = e.target.result;
                document.getElementById("previewBox").style.display = "block";
            };
            reader.readAsDataURL(file);
        }

        function removeImage(event) {
            event.stopPropagation(); // 🔥 IMPORTANT

            document.getElementById("proofInput").value = "";
            document.getElementById("previewImg").src = "";
            document.getElementById("previewBox").style.display = "none";
            document.getElementById("fileName").innerText = "PNG / JPG only (Max 1MB)";
        }
    </script>

</body>

</html>
