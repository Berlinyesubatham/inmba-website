<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(-45deg, #dcedc1, #f0f4e3);
    }

    .container {
      width: 90%;
      max-width: 420px;
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
      text-align: center;
    }

    h2 {
      color: #0f4d0f;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #666;
      font-size: 14px;
      margin-bottom: 20px;
      text-align: left;
    }

    label {
      display: block;
      text-align: left;
      font-weight: 500;
      margin-top: 10px;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-top: 5px;
      border-radius: 10px;
      border: 1px solid #ddd;
      outline: none;
    }

    input:focus {
      border-color: #0f4d0f;
      box-shadow: 0 0 10px rgba(15, 157, 88, 0.2);
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 20px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #0f9d58, #34c759);
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      transform: translateY(-2px);
    }

    .error {
      color: red;
      margin-bottom: 10px;
      text-align: left;
    }

    .success {
      color: green;
      margin-bottom: 10px;
      text-align: left;
    }

    a {
      display: block;
      margin-top: 15px;
      font-size: 13px;
      color: #0f4d0f;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <div class="container">

    <h2>Reset Password</h2>
    <div class="subtitle">Enter your new secure password</div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    {% with messages = get_flashed_messages() %}
    {% if messages %}
    <div class="success">{{ messages[0] }}</div>
    {% endif %}
    {% endwith %}

    <!-- ✅ FIXED: NO TOKEN -->
    <form method="POST" action="/reset_password">

      <label>New Password</label>
      <input type="password" name="password" required>

      <label>Confirm Password</label>
      <input type="password" name="confirm_password" required>

      <button type="submit">Update Password</button>
    </form>

    <a href="/login">Back to Login</a>

  </div>

</body>

</html>
