<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KYC Submitted</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .container {
        background: #ffffff;
        padding: 30px;
        border-radius: 10px;
        width: 400px;
        text-align: center;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h2 {
        color: green;
        margin-bottom: 20px;
    }

    p {
        font-size: 16px;
        margin: 10px 0;
    }

    .status {
        margin-top: 15px;
        color: orange;
        font-weight: bold;
    }

    .btn {
        margin-top: 20px;
        display: inline-block;
        padding: 10px 20px;
        background: green;
        color: white;
        text-decoration: none;
        border-radius: 5px;
    }

    .btn:hover {
        background: darkgreen;
    }

    .note {
        margin-top: 10px;
        font-size: 14px;
        color: gray;
    }
</style>
</head>

<body>

<div class="container">

    <h2>✅ KYC Submitted Successfully</h2>

    <p><strong>Login ID:</strong> {{ user.login_id }}</p>
    <p><strong>Token:</strong> {{ user.token }}</p>

    <p class="status">⏳ Verification in progress (within 3 days)</p>

    <p class="note">
        Please download your acknowledgement and keep it safe.
    </p>

 <a href="{{ url_for('download_ack', token=user.token) }}" class="btn">
    Download Acknowledgement PDF
</a>
<h2>Application Submitted Successfully ✅</h2>


<br><br>



<script>
function toggleDocs() {
    let d = document.getElementById("docs");
    d.style.display = d.style.display === "none" ? "block" : "none";
}
</script>
</div>

</body>
</html>
