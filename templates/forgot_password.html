<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{min-height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(-45deg,#dcedc1,#f0f4e3);}
.container{position:relative;z-index:1;width:90%;max-width:420px;background:white;padding:40px;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,0.1);text-align:center;}
.container h2{color:#0f4d0f;margin-bottom:10px;}
.subtitle{color:#666;font-size:14px;margin-bottom:20px;text-align:left;}
.container label{display:block;text-align:left;font-weight:500;margin-top:10px;font-size:14px;color:#333;}
.container input{width:100%;padding:14px;margin-top:5px;border-radius:10px;border:1px solid #ddd;outline:none;transition:0.3s;}
.container input:focus{border-color:#0f4d0f;box-shadow:0 0 10px rgba(15,157,88,0.2);}
.container button{width:100%;padding:14px;margin-top:20px;border:none;border-radius:10px;background:linear-gradient(135deg,#0f9d58,#34c759);color:white;font-weight:600;cursor:pointer;transition:0.3s;}
.container button:hover{transform:translateY(-3px);box-shadow:0 10px 20px rgba(15,157,88,0.3);}
.extra{margin-top:15px;font-size:13px;}
.extra a{color:#0f4d0f;text-decoration:none;}
</style>
</head>
<body>
<div class="container">
    <h2>Forgot Password</h2>
    <div class="subtitle">Enter your registered email to reset your password.</div>

    {% if error %}
      <div style="color:#d32f2f;margin-bottom:16px;text-align:left;">{{ error }}</div>
    {% endif %}
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div style="color:#1b5e20;margin-bottom:16px;text-align:left;">{{ messages[0] }}</div>
      {% endif %}
    {% endwith %}

    <form method="POST" action="/forgot_password">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="Enter your registered email" required>
        <button type="submit">Send Reset Link</button>
    </form>

    <div class="extra">
        <a href="/login">Back to Login</a>
    </div>
</div>
</body>
</html>
